name: upload-host-media
version: "1.0.0"
tier: 1
description: >
  Upload files, images, and videos to the SpiderIQ CDN (Cloudflare R2),
  then read your hosted media back via the media catalog.
  Reference catalog — upload/video JSON Schemas live in @spideriq/mcp-publish;
  the read-only catalog_* tools live in @spideriq/mcp-media.

tools:
  upload:
    - upload_file              # multipart — predictable filenames
    - upload_base64            # base64 body — predictable filenames
    - upload_image             # image-specific variant with processing
    - media_import_from_url    # URL-based — backend prepends timestamp!
  list_delete:
    - list_files
    - delete_file
  video:
    - media_import_video
    - media_get_video_status
  catalog:                     # read-only — package @spideriq/mcp-media
    - catalog_list_assets      # list every hosted asset (image/video/doc), newest first; filter kind/folder/tags/status/storage_tier
    - catalog_get_asset        # fetch one asset by UUID (404 if not yours)
    - catalog_search_assets    # substring on key/folder + tag overlap (ANY) + kind

# The catalog spans every storage tier (seaweedfs / r2 / peertube) in one
# normalized read surface. REST: GET /api/v1/media/catalog/{assets,assets/{id},search}.
# Each catalog_* tool accepts format: yaml|md for token-efficient agent loops.
catalog_package: "@spideriq/mcp-media"

predictable_filename_routes:
  - upload_file
  - upload_base64
  - upload_image

timestamp_prefixed_routes:
  - media_import_from_url      # current behavior — platform fix pending

public_url_format: >
  https://media.cdn.spideriq.ai/{folder}/{filename}

batch_patterns:
  bulk_url_import:
    tool: media_import_from_url
    payload:
      urls:
        - url: https://example.com/a.png
          filename: a.png    # optional
      folder: optional
  bulk_local_directory:
    recipe: recipes/bulk-media-upload

canonical_see_also:
  - recipes/bulk-media-upload
  - recipes/scroll-sequence
